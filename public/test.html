<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <style>
        :root {
            --primary: #f472b6;
            --secondary: #fce7f3;
        }
        .btn {
            background-color: var(--secondary);
            transition: all 0.3s ease;
            padding: 1rem;
            color: black;
        }
        .btn:hover {
            background-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="btn">Hover me</div>
</body>
</html>
